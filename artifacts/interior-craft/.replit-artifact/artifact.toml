kind = "web"
previewPath = "/"
title = "InteriorCraft Portfolio"
version = "1.0.0"
id = "artifacts/interior-craft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23019
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/interior-craft run dev"

[services.env]
PORT = "23019"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/interior-craft", "run", "build"]
publicDir = "artifacts/interior-craft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
